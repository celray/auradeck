<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide - Overview</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0f0c29; }
  .slide {
    width: 100vw; height: 100vh;
    overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif;
    color: #fff; display: flex;
  }
  .left { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 6%; }
  .right { flex: 1; display: flex; align-items: center; justify-content: center; padding: 4%; }
  .right img { width: 85%; height: auto; border-radius: 12px; }
  .tag { font-size: 1.6vmin; text-transform: uppercase; letter-spacing: 0.15em; color: #e94560; margin-bottom: 2vmin; }
  h2 { font-size: 3.6vmin; font-weight: 700; line-height: 1.3; margin-bottom: 2vmin; }
  p { font-size: 2vmin; color: #aaa; line-height: 1.7; }
  ul { list-style: none; margin-top: 2.5vmin; }
  ul li { font-size: 1.9vmin; color: #ccc; padding: 0.8vmin 0; padding-left: 2.5vmin; position: relative; }
  ul li::before { content: ''; position: absolute; left: 0; top: 50%; width: 1vmin; height: 1vmin; background: #533483; border-radius: 50%; transform: translateY(-50%); }
</style>
</head>
<body>
<div class="slide">
  <div class="left">
    <div class="tag">How It Works</div>
    <h2>A Three-Stage Pipeline</h2>
    <p>AuraDeck deconstructs presentations into atomic, self-contained HTML slides that can be rendered anywhere.</p>
    <ul>
      <li>Import from any source format</li>
      <li>Process into standalone slide units</li>
      <li>Present with zero dependencies</li>
    </ul>
  </div>
  <div class="right">
    <img src="./images/overview-graphic.svg" alt="Pipeline overview diagram">
  </div>
</div>
</body>
</html>
