<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide - Closing</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0f0c29; }
  .slide {
    width: 100vw; height: 100vh;
    overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif;
    color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
  }
  .bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; opacity: 0.5; }
  .content { position: relative; z-index: 1; }
  h2 { font-size: 4.5vmin; font-weight: 700; margin-bottom: 2vmin; }
  h2 span { color: #e94560; }
  p { font-size: 2.2vmin; color: #aaa; margin-bottom: 3.5vmin; }
  .links { display: flex; gap: 2.5vmin; justify-content: center; }
  .links a { display: inline-block; padding: 1.2vmin 3.5vmin; border-radius: 9999px; font-size: 1.8vmin; text-decoration: none; font-weight: 600; transition: transform 0.2s; }
  .links a:hover { transform: scale(1.05); }
  .links .primary { background: #e94560; color: #fff; }
  .links .secondary { border: 2px solid #533483; color: #ccc; }
  .footer { position: absolute; bottom: 4vmin; font-size: 1.4vmin; color: #555; }
</style>
</head>
<body>
<div class="slide">
  <img class="bg" src="./images/hero-bg.svg" alt="background">
  <div class="content">
    <h2>Start building with <span>AuraDeck</span></h2>
    <p>Open source. Zero dependencies. Ready when you are.</p>
    <div class="links">
      <a class="primary" href="#">Get Started</a>
      <a class="secondary" href="#">View on GitHub</a>
    </div>
  </div>
  <div class="footer">auradeck.dev &mdash; MIT License</div>
</div>
</body>
</html>
