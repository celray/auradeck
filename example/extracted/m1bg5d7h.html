<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide - Traction</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0f0c29; }
  .slide {
    width: 100vw; height: 100vh;
    overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif;
    color: #fff; display: flex;
  }
  .left { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 6%; }
  .right { flex: 1; display: flex; align-items: center; justify-content: center; padding: 4%; }
  .right img { width: 90%; height: auto; border-radius: 12px; }
  .tag { font-size: 1.6vmin; text-transform: uppercase; letter-spacing: 0.15em; color: #e94560; margin-bottom: 2vmin; }
  h2 { font-size: 3.4vmin; font-weight: 700; margin-bottom: 2.5vmin; line-height: 1.3; }
  .stats { display: flex; gap: 3vmin; margin-top: 3vmin; }
  .stat { text-align: center; }
  .stat .number { font-size: 4vmin; font-weight: 800; color: #e94560; }
  .stat .label { font-size: 1.5vmin; color: #888; margin-top: 0.5vmin; text-transform: uppercase; letter-spacing: 0.1em; }
  p { font-size: 2vmin; color: #aaa; line-height: 1.7; }
</style>
</head>
<body>
<div class="slide">
  <div class="left">
    <div class="tag">Growth</div>
    <h2>Traction &amp; Adoption</h2>
    <p>Quarter-over-quarter growth driven by developer word-of-mouth and open-source momentum.</p>
    <div class="stats">
      <div class="stat"><div class="number" id="statUsers">0</div><div class="label">Users</div></div>
      <div class="stat"><div class="number" id="statDecks">0</div><div class="label">Decks Created</div></div>
      <div class="stat"><div class="number" id="statStars">0</div><div class="label">GitHub Stars</div></div>
    </div>
  </div>
  <div class="right">
    <img src="./images/chart-placeholder.svg" alt="Growth chart">
  </div>
</div>
<script>
(function() {
  function animateCounter(el, target, suffix) {
    suffix = suffix || '';
    var duration = 1500, start = Date.now();
    var id = setInterval(function() {
      var t = Math.min((Date.now() - start) / duration, 1);
      t = 1 - Math.pow(1 - t, 3);
      el.textContent = Math.floor(t * target).toLocaleString() + suffix;
      if (t >= 1) clearInterval(id);
    }, 16);
  }

  var started = false;
  function startCounters() {
    if (started) return;
    started = true;
    animateCounter(document.getElementById('statUsers'), 12400, '+');
    animateCounter(document.getElementById('statDecks'), 58000, '+');
    animateCounter(document.getElementById('statStars'), 3200, '');
  }

  // Primary: watch the parent iframe element for the 'active' class.
  // This works without postMessage and is immune to rAF suppression in hidden frames.
  try {
    var fe = window.frameElement;
    if (fe) {
      if (fe.classList.contains('active')) {
        startCounters();
      } else {
        var obs = new MutationObserver(function() {
          if (fe.classList.contains('active')) {
            obs.disconnect();
            startCounters();
          }
        });
        obs.observe(fe, { attributes: true, attributeFilter: ['class'] });
      }
    }
  } catch (_) {}

  // Secondary: postMessage from AuraDeck (belt-and-suspenders).
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'auradeck-visible') startCounters();
  });

  // Fallback: standalone browser viewing.
  window.addEventListener('load', function() {
    setTimeout(startCounters, 300);
  });
})();
</script>
</body>
</html>
