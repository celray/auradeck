<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide - Team</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0f0c29; }
  .slide {
    width: 100vw; height: 100vh;
    overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif;
    color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .tag { font-size: 1.6vmin; text-transform: uppercase; letter-spacing: 0.15em; color: #e94560; margin-bottom: 1.5vmin; }
  h2 { font-size: 3.4vmin; font-weight: 700; margin-bottom: 2vmin; }
  p.desc { font-size: 2vmin; color: #aaa; max-width: 55%; text-align: center; line-height: 1.7; margin-bottom: 4vmin; }
  .team-img { width: 50vmin; border-radius: 1.5vmin; border: 1px solid #0f3460; }
</style>
</head>
<body>
<div class="slide">
  <div class="tag">The People</div>
  <h2>Meet the Team</h2>
  <p class="desc">A small, focused team of engineers and designers obsessed with making presentations portable and beautiful and flexible.</p>
  <img class="team-img" src="./images/team-photo.svg" alt="Team photo">
</div>
</body>
</html>
